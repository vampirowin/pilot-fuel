openapi: 3.0.3
info:
  title: Pilot GPS API v3
  version: 7.9.1
  description: |
    REST API (v3)

    Get a token: `POST /api/v3/auth/token` (using login and password).
    
    Use the token via the `Authorization: Bearer {token}` header.
    
    If the authentication response returns a non-zero `node_id` parameter
    
    the client must send the `X-Node: {node_id}` header to route requests to the correct cluster node.
    
    When using the API in the context of `PILOT Extension`, it can be used without a token and node_id
    (a cookie-based session is used).


servers:
  - url: https://boooch.pilot-gps.com
    description: Sandbox
  - url: https://pilot-gps.com
    description: Production
  - url: https://pilot-gps.africa
    description: Africa
  - url: https://blade.pilot-gps.com
    description: Blade
  - url: https://ksa.pilot-gps.com
    description: Saudi Arabia
security:
  - BearerAuth: [ ]
tags:
  - name: Auth
    description: Authentication and token issuance
  - name: Vehicles
    description: Vehicles, statuses, and tracks
  - name: Tracks
    description: Movement, tracks, and mileage
  - name: Sensors
    description: Sensor data
  - name: Geo
    description: Geofences, visits, and mileage by zone
  - name: Fuel
    description: Fuel, filling stations, and transactions
  - name: Drivers
    description: Drivers, iButton, and waybills
  - name: Notifications
    description: Notifications and live events
  - name: Accounts
    description: Partner accounts and users
  - name: References
    description: Reference data (vehicle types, models, prices, modules, timezones)
  - name: Tags
    description: Vehicle tag management
  - name: Waybills
    description: Waybill management
  - name: Users
    description: User management within an account
  - name: Geofences
    description: Geofence management and vehicle links
  - name: Reports
    description: Report listing and execution
paths:
  /api/v3/auth/token:
    post:
      tags:
        - Auth
      security: [ ]
      summary: Get access token
      description: 'Authenticates by login and password and returns a token,
        which must be sent in the `Authorization: Bearer {token}` header.
        The response also returns `node_id`, which must be sent in the `X-Node-Id` header in all subsequent API v3 requests.
'
      operationId: getToken
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: User login
                password:
                  type: string
                  description: User password
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: 'Access token (used in Authorization: Bearer
                      {token})'
                  expires_in:
                    type: integer
                    description: Token lifetime in seconds
                  node_id:
                    type: integer
                    example: 2
                    description: User node identifier for the `X-Node-Id` header
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Auth
      summary: Logout (revoke token)
      description: 'Destroys the current session and invalidates the access token.'
      operationId: revokeToken
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v3/auth/me:
    get:
      tags:
        - Auth
      summary: Get current authenticated user
      description: 'Returns information about the currently authenticated user.
        Requires an active session and/or a valid token used as session_id.
        '
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      security:
        - BearerAuth: [ ]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  msg:
                    type: string
                    example: OK
                  process_time:
                    type: number
                    example: 0.001
                  user:
                    type: object
                    properties:
                      usr_id:
                        type: integer
                        example: 123
                      account_id:
                        type: integer
                        example: 10
                      partner_id:
                        type: integer
                        example: 5
                      node_id:
                        type: integer
                        example: 2
                      role_id:
                        type: integer
                        example: 1
                      username:
                        type: string
                        example: demo
                      name:
                        type: string
                        example: John Smith
                      email:
                        type: string
                        nullable: true
                        example: user@example.com
                      ips_on:
                        type: integer
                        description: Flag indicating whether the IP filter is enabled
                        example: 0
                      ips:
                        type: string
                        nullable: true
                        description: List of allowed IPs (if the IP filter is enabled)
                        example: 1.2.3.4,5.6.7.8
        '401':
          description: Unauthorized (session not active or user not logged in)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 1
                  msg:
                    type: string
                    example: Unauthorized
  /api/v3/vehicles:
    get:
      tags:
        - Vehicles
      summary: Vehicles list
      description: 'Returns the list of vehicles for the current account.'
      operationId: listVehicles
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      responses:
        '200':
          description: Vehicle list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehiclesListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: list
  /api/v3/vehicles/by-plate:
    get:
      tags:
        - Vehicles
      summary: Get IMEI by license plate
      description: 'Returns the IMEI by the vehicle license plate.'
      operationId: getImeiByPlate
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - in: query
          name: vehnum
          required: true
          example: 'Velavu-00Q8E'
          schema:
            type: string
          description: Vehicle license plate number (as stored in Pilot)
      responses:
        '200':
          description: IMEI found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImeiResponse'
        '404':
          description: Vehicle with this plate was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: get_imei
  /api/v3/fuel/stations:
    get:
      tags:
        - Fuel
      summary: Fuel stations list
      description: 'Returns the list of fuel stations.'
      operationId: listFuelStations
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      responses:
        '200':
          description: Fuel stations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FuelStationsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: azs
  /api/v3/fuel/transactions:
    post:
      tags:
        - Fuel
      summary: Add fuel card transaction
      description: 'Adds a fuel card transaction.'
      operationId: addFuelTransaction
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FuelTransactionCreateRequest'
      responses:
        '200':
          description: Transaction saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FuelTransactionCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: add_fuel_transaction
  /api/v3/ibuttons:
    get:
      tags:
        - Drivers
      summary: Global iButton list
      description: 'iButton usage history across all vehicles.'
      operationId: listIButtons
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
      responses:
        '200':
          description: iButton list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IButtonListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: take_ibutton_list

  /api/v3/vehicles/ibuttons:
    get:
      tags:
        - Drivers
      summary: iButton history for a vehicle
      description: 'iButton usage history for a specific vehicle.'
      operationId: getIButtonsForVehicle
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'

        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
      responses:
        '200':
          description: iButton history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IButtonHistoryResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: take_ibutton_list
  /api/v3/drivers:
    get:
      tags:
        - Drivers
      summary: Drivers list
      description: 'Returns the list of drivers.'
      operationId: listDrivers
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      responses:
        '200':
          description: Drivers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriversListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: drivers_list
    post:
      tags:
        - Drivers
      summary: Create or update driver
      description: 'Creates or updates a driver record.'
      operationId: createOrUpdateDriver
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverCreateRequest'
      responses:
        '200':
          description: Driver saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: drivers_add
  /api/v3/drivers/activity:
    get:
      tags:
        - Drivers
      summary: Driver activity
      description: 'Returns driver activity data for the selected period.'
      operationId: getDriverActivity
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - in: query
          name: driver_id
          required: true
          schema:
            type: integer
            example: 36
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
      responses:
        '200':
          description: Driver activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverActivityResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: drivers_activity
  /api/v3/geofences:
    get:
      tags:
        - Geo
      summary: Geofence list
      description: 'Returns the list of geofences.'
      operationId: listGeofences
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      responses:
        '200':
          description: Geofence list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeofencesListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: geofencelist
    post:
      tags:
        - Geo
      summary: Create geofence
      description: 'Creates a new geofence.'
      operationId: createGeofence
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeofenceAdd'
      responses:
        '200':
          description: Geofence created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeofenceCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: geofenceadd
    delete:
      tags:
        - Geo
      summary: Delete geofence
      description: 'Deletes a geofence by ID.'
      operationId: deleteGeofence
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - in: query
          name: id
          schema:
            type: integer
        - in: query
          name: external_id
          schema:
            type: string
      responses:
        '200':
          description: Geofence deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: geofencedel
    put:
      tags:
        - Geo
      summary: Update geofence
      description: |
        Updates the geometry and/or name of an existing geofence.
        Supports Polygon and Circle geometry types.
      operationId: geofenceUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeofenceUpdateRequest'
      responses:
        '200':
          description: Geofence updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Geofence not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v3/geofences/visits:
    get:
      tags:
        - Geo
      summary: Geofence visit history
      description: 'History of entries to and exits from geofences.'
      operationId: getGeofenceVisits
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'
      responses:
        '200':
          description: Geofence visits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoVisitsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: ag_geofences
  /api/v3/geofences/mileage:
    get:
      tags:
        - Geo
      summary: Mileage in geofences
      description: 'Returns mileage by geofences for the selected period.'
      operationId: getZonesMileage
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'
        - in: query
          name: fences
          required: false
          schema:
            type: string
          description: Comma-separated list of geofence names
      responses:
        '200':
          description: Mileage by geofence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZonesMileageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: fences_mileage

  /api/v3/notifications:
    get:
      tags:
        - Notifications
      summary: Notification module events
      description: 'Returns Notification module events for the selected period.'
      operationId: listNotifications
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
        - in: query
          name: notification
          required: false
          schema:
            type: string
          description: Notification name
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: notifications
  /api/v3/events/live:
    get:
      tags:
        - Notifications
      summary: Live events
      description: 'Stream of current events.'
      operationId: getLiveEvents
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
      responses:
        '200':
          description: Live events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveEventsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: live_events
  /api/v3/vehicles/status:
    get:
      tags:
        - Vehicles
      summary: Current vehicle status
      description: 'Returns the current status of vehicles: coordinates, speed, direction, sensor states, and so on.'
      operationId: getVehicleStatus
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImeiList'
        - $ref: '#/components/parameters/VehicleAgentIdList'
      responses:
        '200':
          description: Vehicle status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleStatusResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: status
  /api/v3/vehicles/last24h:
    get:
      tags:
        - Vehicles
      summary: Vehicle status for the last 24 hours
      description: 'Vehicle data for the last 24 hours.

        '
      operationId: VehicleStatus24
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'
      responses:
        '200':
          description: Vehicle status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleMetricsResponse'
        '404':
          description: Device not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: status
  /api/v3/vehicles/instant-status:
    get:
      tags:
        - Vehicles
      summary: Mileage and fuel at a point in time
      description: 'Returns the odometer and fuel level at a specific point in time.'
      operationId: getInstantStatus
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'
        - $ref: '#/components/parameters/StartQuery'
      responses:
        '200':
          description: Mileage and fuel at a point in time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstantStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: istatus
  /api/v3/vehicles/track:
    get:
      tags:
        - Tracks
      summary: Movement track for a period
      description: 'Returns the sequence of movement points.'
      operationId: getTrack
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'

        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
        - in: query
          name: fences
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
          description: Whether to include geofence information
        - in: query
          name: eco
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
          description: Whether to include eco-driving metrics
      responses:
        '200':
          description: Track
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: run
  /api/v3/vehicles/track/geo:
    get:
      tags:
        - Tracks
      summary: Trips and parking report
      description: 'Returns the structure of trips and parking intervals for the selected period.'
      operationId: getTrackGeo
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'

        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
      responses:
        '200':
          description: Trips and parking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackGeoResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-legacy:
        cmd: rungeo
  /api/v3/vehicles/track/stops:
    get:
      tags:
        - Tracks
      summary: Stops report
      description: 'Returns the list of stops / parking intervals for the selected period.'
      operationId: getTrackStops
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - $ref: '#/components/parameters/VehicleImei'
        - $ref: '#/components/parameters/VehicleAgentId'

        - $ref: '#/components/parameters/StartQuery'
        - $ref: '#/components/parameters/StopQuery'
      responses:
        '200':
          description: Stops
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackStopsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v3/vehicles/forecast_here:
    get:
      tags:
        - Tracks
      summary: Route arrival forecast using the HERE service
      description: 'Route arrival forecast using the HERE service.
        A HERE service key must be configured in the contract settings to use this endpoint.
        '
      operationId: getRoute
      parameters:
        - $ref: '#/components/parameters/XNodeIdHeader'
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum:
              - car
              - truck
              - bus
              - taxi
              - scooter
              - bicycle
              - pedestrian

          description: Transport type, one of
            bicycle - bicycle
            bus - bus
            car - car
            pedestrian - pedestrian
            scooter - scooter
            taxi - taxi
            truck - truck
            default is car
          example: car
        - in: query
          name: origin
          required: true
          schema:
            type: string
          description: Start point coordinates
            in `lat,lon` format
          example: 47.211908,39.613767
        - in: query
          name: destination
          required: true
          schema:
            type: string
