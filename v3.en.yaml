components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    VehicleImeiList:
      in: query
      name: imei
      required: false
      schema:
        type: string
        example: '866795036141404,12312333398'
      description: Comma-separated list of vehicle IMEIs. Takes precedence over agent_id if both parameters are specified.

    VehicleAgentIdList:
      name: agent_id
      in: query
      description: Comma-separated list of Agent IDs
      required: false
      schema:
        type: string
        example: 196,197,198

    VehicleImei:
      name: imei
      in: query
      required: false
      schema:
        type: string
        example: '866795036141404'
      description: Vehicle IMEI. Takes precedence over agent_id if both parameters are specified.
    VehicleAgentId:
      name: agent_id
      in: query
      required: false
      schema:
        type: integer
        example: 196
      description: Vehicle agent_id.
    StartQuery:
      in: query
      name: ts
      required: true
      example: 1763638500
      schema:
        type: integer
        format: int64
      description: Start time (UTC) of the period (Unix timestamp)
    StopQuery:
      in: query
      name: te
      required: true
      schema:
        type: integer
        format: int64
        example: 1763838500
      description: End time (UTC) of the period (Unix timestamp)
    XNodeIdHeader:
      in: header
      name: X-Node
      required: false
      schema:
        type: integer
        example: 2
      description: User node used to route the request to the correct backend

  schemas:
    OkResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        msg:
          type: string
          example: OK
        process_time:
          type: number
          example: 0.001
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 1
        msg:
          type: string
          example: Error message
        process_time:
          type: number
          format: float
          example: 0.001
        error:
          type: string
          example: Additional error details

    VehiclesListResponse:
      allOf:
        - $ref: '#/components/schemas/OkResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Vehicle'
          required:
            - code
            - msg
            - data
    VehicleData:
      type: object
      properties:
        id:
          type: integer
          example: 196
        agentid:
          type: integer
          example: 196
        vehiclenumber:
          type: string
          example: TEST ODO
        driver:
          type: string
          example: Ivanov Peter
        motor_hours:
          type: integer
          example: 15075052
        imei:
          type: string
          example: '866795036141404'
        lat:
          type: number
          format: float
          example: 55.470108
        lon:
          type: number
          format: float
          example: 37.573349
        alt:
          type: integer
          example: 0
        dir:
          type: integer
          example: 124
        sat:
          type: integer
          example: 19
        unixtimestamp:
          type: string
          example: '1763633238'
        speed:
          type: integer
          example: 0
        firing:
          type: integer
          example: 1
        fence:
          type: string
          example: ''
        sensors:
          type: array
          items:
            $ref: '#/components/schemas/Sensor'
      required:
        - id
        - agentid
        - vehiclenumber
        - driver
        - motor_hours
        - imei
        - lat
        - lon
        - alt
        - dir
        - sat
        - unixtimestamp
        - speed
        - firing
        - fence
        - sensors
    Vehicle:
      type: object
      properties:
        agentid:
          type: integer
          example: 9003
        imei:
          type: string
          example: "356307046873054"
        typeid:
          type: integer
        type:
          type: string
          example: "Car"
        vehiclenumber:
          type: string
          example: "X444MP123"
        folder:
          type: string
          example: "Geo-Center LLC"
        created_time:
          type: integer
          format: int64
        current_mileage:
          type: number
          format: double
        status:
          $ref: '#/components/schemas/VehicleStatus'

    Sensor:
      type: object
      properties:
        name:
          type: string
          example: Axle load #2
        id:
          type: integer
          example: 940
        hum_value:
          type: string
          example: 14356 kg
        dig_value:
          type: number
          oneOf:
            - type: integer
            - type: number
          example: 14356
        raw_value:
          type: string
          example: '14356'
        change_ts:
          type: integer
          example: 1763633148
        group:
          type: string
          example: ''
        tags:
          type: string
          example: '12,34'
        issues:
          type: integer
          example: 0
      required:
        - name
        - id
        - hum_value
        - dig_value
        - raw_value
        - change_ts
        - group
    ImeiResponse:
      allOf:
        - $ref: '#/components/schemas/OkResponse'
        - type: object
          properties:
            imei:
              type: string
              example: '356307045913463'
    VehicleStatusResponse:
      allOf:
        - $ref: '#/components/schemas/OkResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/VehicleData'
              description: Array of vehicle status data
          required:
            - data
    VehicleMetricsResponse:
      allOf:
        - $ref: '#/components/schemas/OkResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/VehicleMetrics'
              description: Array of vehicle status data
          required:
            - data
    VehicleMetrics:
      type: object
      properties:
        full_mileage:
          type: number
          format: float
          minimum: 0
          example: 14.7
          description: Total mileage in kilometers
        fuel_start:
          type: number
          format: float
          minimum: 0
          example: 120.33
          description: Initial fuel level in liters
        fuel_stop:
          type: integer
          format: int32
          minimum: 0
          example: 0
          description: Final fuel level in liters
        fuel_fill:
          type: number
          format: float
          minimum: 0
          example: 0
          description: Fuel refilled in liters
        fuel_drain:
          type: number
          format: float
          minimum: 0
          example: 0
          description: Fuel drained in liters
        fuel_consumption(l):
          type: number
          format: float
          example: 10.2
          description: Total fuel consumption in liters
        fuel_consumption(l/100km):
          type: number
          format: float
          example: 10.2
          description: Fuel consumption per 100 km (can be number or dash for no data)
        fuel_consumption_norm(l):
          type: number
          format: float
          example: 10.2
          description: Normalized fuel consumption in liters (can be number or dash
            for no data)
        fuel_consumption_norm(l/100km):
          type: number
          format: float
          example: 10.2
          description: Normalized fuel consumption per 100 km
        motohours:
          type: integer
          minimum: 0
          example: 0
          description: Engine running time in hours
        imei:
          type: string
          example: 866795036141404
          description: Vehicle device IMEI number
        id:
          type: integer
          example: 196
          description: Vehicle Agent ID
      required:
        - full_mileage
        - fuel_start
        - fuel_stop
        - fuel_fill
        - fuel_drain
        - fuel_consumption(l)
        - fuel_consumption(l/100km)
        - fuel_consumption_norm(l)
        - fuel_consumption_norm(l/100km)
        - motohours
    VehicleStatus:
      type: object
      properties:
        unixtimestamp:
          type: integer
          format: int64
        lat:
          type: number
        lon:
          type: number
        speed:
          type: number
        dir:
          type: integer
        alt:
          type: integer
        satsinview:
          type: integer
        sensors_status:
          type: array
          items:
            $ref: '#/components/schemas/SensorStatus'
    SensorStatus:
      type: object
      properties:
        name:
          type: string
          example: Axle load #2
        id:
          type: integer
          example: 940
        hum_value:
          type: string
          example: '14356.5 kg'
        dig_value:
          type: number
          format: float
          example: 14356.5
        raw_value:
          type: string
          example: '14356.5'
        change_ts:
          type: integer
          format: int64
          example: 1763633148
        group:
          type: string
          example: 'Weight'
    InstantStatusResponse:
      allOf:
        - $ref: '#/components/schemas/OkResponse'
        - type: object
          properties:
            imei:
              type: string
            ts:
              type: integer
              format: int64
            odometer:
              type: number
            fuel_level:
              type: number
    TrackResponse:
      allOf:
        - $ref: '#/components/schemas/OkResponse'
