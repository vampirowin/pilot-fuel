      operationId: calculateRoute
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
          description: Origin coordinates (lat,lon)
          example: '55.7558,37.6173'
        - name: destination
          in: query
          required: true
          schema:
            type: string
          description: Destination coordinates (lat,lon)
          example: '55.7522,37.6156'
        - name: mode
          in: query
          required: false
          schema:
