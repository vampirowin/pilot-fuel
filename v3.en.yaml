          type: integer
          example: 25
          description: Average speed
        length:
          type: number
          format: float
          example: 77.9
          description: Track length
        maxspeed:
          type: integer
          example: 67
          description: Maximum speed
        lat_end:
          type: string
          example: "55.470051"
          description: End latitude
        lat_start:
          type: string
          example: "55.470127"
          description: Start latitude
        lon_end:
          type: string
          example: "37.571861"
          description: End longitude
        lon_start:
          type: string
          example: "37.571964"
          description: Start longitude
        ts:
          type: integer
          format: int64
          example: 1763557029
          description: Start timestamp
        te:
          type: integer
