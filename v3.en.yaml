          example: "REGION"
          description: Start name/region
        lat:
          type: number
          format: float
          example: 55.420689
          description: Latitude coordinate
        lon:
          type: number
          format: float
          example: 37.511608
          description: Longitude coordinate
        msgtype:
          type: integer
          example: 1
          description: Message type 1 - Enter 2 - Exit
    TrackPoint:
