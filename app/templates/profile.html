{% extends "base.html" %}
{% block title %}UI fuel — Профиль{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Профиль</h1>
</div>
<div class="card" style="max-width:480px">
  <form method="POST" action="/profile">
    <div class="form-group">
      <label>Пользователь</label>
      <input type="text" class="form-input" value="{{ user.username }}" disabled style="opacity:.7">
    </div>
    <div class="form-group">
      <label>Роль</label>
      <input type="text" class="form-input" value="{{ {'superadmin': 'Администратор', 'company_admin': 'Админ компании', 'user': 'Пользователь'}.get(user.role, user.role) }}" disabled style="opacity:.7">
    </div>
    <div class="form-group">
      <label for="timezone">Часовой пояс</label>
      <select id="timezone" name="timezone" class="form-input">
        <optgroup label="Россия">
          {% for val, label in ru_zones %}
          <option value="{{ val }}" {% if user.timezone == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </optgroup>
        <optgroup label="Остальные">
          <option value="Etc/UTC" {% if user.timezone == 'Etc/UTC' %}selected{% endif %}>UTC</option>
          {% for val, label in other_zones %}
          <option value="{{ val }}" {% if user.timezone == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </optgroup>
      </select>
    </div>
    <div style="margin-top:16px">
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </div>
  </form>
  {% if saved %}
  <div class="toast toast-success" style="margin-top:12px">Сохранено</div>
  {% endif %}
</div>
{% endblock %}
