<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
  <div class="modal" style="width: 800px; max-width: 95vw;">
    <div class="modal-header">
      <h2>Трек — {{ plate }}</h2>
      <button type="button" class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="period-selector" style="margin-bottom: 12px;">
        <div class="period-chips" style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
          <button type="button" class="chip" onclick="tm.setPeriod(6,this)">7 дней</button>
          <button type="button" class="chip" onclick="tm.setPeriod(0,this)">Сегодня</button>
          <button type="button" class="chip" onclick="tm.setPeriod(1,this)">Вчера</button>
          <button type="button" class="chip" onclick="tm.setPeriod(13,this)">14 дней</button>
          <button type="button" class="chip" onclick="tm.setPeriod(29,this)">30 дней</button>
          <button type="button" class="chip chip-custom" onclick="document.getElementById('tm-custom').style.display='flex'">Свой</button>
        </div>
        <div id="tm-custom" style="display:none;align-items:center;gap:6px;margin-top:6px">
          <input type="date" id="tm-date-from" value="{{ date_from }}" style="flex:1">
          <span style="color:var(--text-dim)">—</span>
          <input type="date" id="tm-date-to" value="{{ date_to }}" style="flex:1">
          <button type="button" class="btn btn-sm btn-primary" onclick="tm.load()">Построить</button>
        </div>
      </div>
      <div id="tm-map-container" style="border-radius:8px;overflow:hidden;border:1px solid var(--border);position:relative">
        <div id="tm-loading" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);z-index:1000;border-radius:8px">
          <span style="color:var(--text-secondary);font-size:14px">Загрузка...</span>
        </div>
        <div id="tm-map" style="height:450px;width:100%"></div>
      </div>
      <div id="tm-stats" style="display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--text-secondary);flex-wrap:wrap"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Закрыть</button>
    </div>
  </div>
</div>
<script>
var tm = (function() {
  var map = null, polyline = null;
  var vehId = {{ vehicle_id }};

  function loadMap() {
    if (map) return;
    var container = document.getElementById('tm-map');
    if (!container._leaflet_loaded) {
      container._leaflet_loaded = true;
      var s = document.createElement('link');
      s.rel = 'stylesheet'; s.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
      document.head.appendChild(s);
      var j = document.createElement('script');
      j.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      j.onload = function() {
        map = L.map('tm-map').setView([55.75, 37.61], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 18,
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        tm.load();
      };
      document.body.appendChild(j);
    }
  }

  function load() {
    var df = document.getElementById('tm-date-from').value;
    var dt = document.getElementById('tm-date-to').value;
    if (!df || !dt) return;
    var loading = document.getElementById('tm-loading');
    loading.style.display = 'flex';
    fetch('/api/vehicles/' + vehId + '/points?date_from=' + df + '&date_to=' + dt)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        loading.style.display = 'none';
        if (!map) return;
        if (polyline) { map.removeLayer(polyline); polyline = null; }
        if (window._tmSegments) {
          window._tmSegments.forEach(function(l) { map.removeLayer(l); });
          window._tmSegments = null;
        }
        var pts = data.points || [];
        if (pts.length < 2) {
          document.getElementById('tm-stats').innerHTML = '<span style="color:var(--text-dim)">Нет данных за выбранный период</span>';
          if (data.truncated) {
            document.getElementById('tm-stats').innerHTML += '<span style="color:var(--warning);margin-left:8px">⚠ Максимум 3 дня</span>';
          }
          return;
        }
        pts.sort(function(a,b) { return (a.ts||0) - (b.ts||0); });
        var segs = [], allLatLngs = [];
        for (var i = 0; i < pts.length - 1; i++) {
          var lat1 = parseFloat(pts[i].lat), lon1 = parseFloat(pts[i].lon);
          var lat2 = parseFloat(pts[i+1].lat), lon2 = parseFloat(pts[i+1].lon);
          if (isNaN(lat1) || isNaN(lon1) || isNaN(lat2) || isNaN(lon2)) continue;
          allLatLngs.push([lat1, lon1]);
          if (i === pts.length - 2) allLatLngs.push([lat2, lon2]);
          var speed = parseFloat(pts[i].speed) || 0;
          var color = speed < 40 ? '#4caf50' : speed < 80 ? '#ff9800' : '#f44336';
          var seg = L.polyline([[lat1,lon1],[lat2,lon2]], {
            color: color, weight: 3, opacity: 0.8
          }).addTo(map);
          segs.push(seg);
        }
        window._tmSegments = segs;
        if (allLatLngs.length > 0) {
          var bounds = L.latLngBounds(allLatLngs);
          map.fitBounds(bounds.pad(0.1));
        }
        var maxSpeed = 0;
        for (var i = 0; i < pts.length; i++) {
          if ((parseFloat(pts[i].speed)||0) > maxSpeed) maxSpeed = parseFloat(pts[i].speed);
        }
        var statsHtml = '<span>' + pts.length + ' точек</span>' +
          '<span>макс. ' + maxSpeed + ' км/ч</span>';
        if (data.truncated) {
          statsHtml += '<span style="color:var(--warning)">⚠ Максимум 3 дня</span>';
        }
        document.getElementById('tm-stats').innerHTML = statsHtml;
      })
      .catch(function() {
        loading.style.display = 'none';
        document.getElementById('tm-stats').innerHTML = '<span style="color:var(--danger)">Ошибка загрузки трека</span>';
      });
  }

  function setPeriod(daysBack, btn) {
    var d = new Date();
    var to = d.toISOString().split('T')[0];
    if (daysBack > 0) d.setDate(d.getDate() - daysBack);
    var from = d.toISOString().split('T')[0];
    document.getElementById('tm-date-from').value = from;
    document.getElementById('tm-date-to').value = to;
    document.querySelectorAll('#tm-custom .chip').forEach(function(c) { c.classList.remove('active'); });
    if (btn) {
      document.querySelectorAll('.period-chips .chip').forEach(function(c) { c.classList.remove('active'); });
      btn.classList.add('active');
    }
    load();
  }

  loadMap();
  document.getElementById('tm-date-from').value = '{{ date_from }}';
  document.getElementById('tm-date-to').value = '{{ date_to }}';
  document.querySelector('.period-chips .chip:first-child').classList.add('active');

  return { load: load, setPeriod: setPeriod };
})();
</script>
