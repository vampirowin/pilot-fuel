<div class="modal-overlay" onclick="if(event.target===this)this.remove()">
  <div class="modal">
    <div class="modal-header">
      <h2>Редактировать заправку</h2>
      <button type="button" class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <form hx-post="/api/refuels/{{ entry.id }}/edit" hx-target="#refuels-list" hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) this.closest('.modal-overlay').remove()">
      <div class="modal-body">
        <div class="form-group">
          <label>Транспорт</label>
          <input type="text" class="form-input" value="{{ vehicle.plate_number or vehicle.name }}" disabled style="opacity:.7">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Дата</label>
            <input type="text" class="form-input" value="{{ default_date }}" disabled style="opacity:.7">
          </div>
          <div class="form-group">
            <label>Время</label>
            <input type="text" class="form-input" value="{{ default_time }}" disabled style="opacity:.7">
          </div>
        </div>
        {% if entry.pilot_amount is not none %}
        <div class="form-group">
          <label>Pilot (л)</label>
          <input type="text" class="form-input" value="{{ '%.1f'|format(entry.pilot_amount) }}" disabled style="opacity:.7">
        </div>
        {% endif %}
        <div class="form-group">
          <label>Объём по чеку (л)</label>
          <input type="number" name="actual_amount" step="0.1" min="0" required value="{{ '%.1f'|format(entry.actual_amount) if entry.actual_amount is not none else '' }}">
        </div>
        <div class="form-group">
          <label>Номер чека</label>
          <input type="text" name="receipt_number" value="{{ entry.receipt_number or '' }}" placeholder="необязательно">
        </div>
        {% if entry.is_false %}
        <div class="form-group" style="margin-top:12px;padding:10px;background:#fef3cd;border-radius:6px;border:1px solid #ffc107">
          <strong style="color:#856404">Отмечено как ложная</strong>
          {% if entry.false_reason %}<p style="margin:4px 0 0;color:#856404;font-size:13px">Причина: {{ entry.false_reason }}</p>{% endif %}
          <button type="button" class="btn btn-sm btn-secondary" style="margin-top:8px"
                  hx-vals='{"page":{{ page }},"date_from":"{{ date_from }}","date_to":"{{ date_to }}"}'
                  hx-post="/api/refuels/{{ entry.id }}/unmark-false"
                  hx-target="#refuels-list" hx-swap="innerHTML"
                  hx-on::after-request="if(event.detail.successful) this.closest('.modal-overlay').remove()">
            Снять отметку «Ложная»
          </button>
        </div>
        {% else %}
        <div style="margin-top:12px">
          <button type="button" class="btn btn-sm btn-secondary"
                  hx-get="/api/refuels/{{ entry.id }}/mark-false-form?page={{ page }}&date_from={{ date_from }}&date_to={{ date_to }}"
                  hx-target="#modal-container" hx-swap="innerHTML">
            Отметить как ложную
          </button>
        </div>
        {% endif %}
        {% if is_admin or entry.source == "manual" %}
        <div style="margin-top:12px">
          <button type="button" class="btn btn-sm btn-danger"
                  hx-vals='{"page":{{ page }},"date_from":"{{ date_from }}","date_to":"{{ date_to }}"}'
                  hx-post="/api/refuels/{{ entry.id }}/delete"
                  hx-target="#refuels-list" hx-swap="innerHTML"
                  hx-confirm="Удалить запись из БД?"
                  hx-on::after-request="if(event.detail.successful) this.closest('.modal-overlay').remove()">
            Удалить запись
          </button>
        </div>
        {% endif %}
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </div>
</div>
