{% extends "base.html" %}
{% block title %}pilot-fuel — {{ 'Редактировать' if company else 'Добавить' }} компанию{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ 'Редактировать' if company else 'Добавить' }} компанию</h1>
</div>
<div class="card">
  <form method="POST" style="max-width:400px">
    <div class="form-group">
      <label for="name">Название</label>
      <input type="text" id="name" name="name" value="{{ company.name if company else '' }}" required>
    </div>
    <div style="margin-top:16px">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="/admin/companies" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
