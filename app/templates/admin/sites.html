{% extends "base.html" %}
{% block title %}UI fuel — Площадки{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Площадки — {{ company.name }}</h1>
  <a href="/admin/companies/{{ company.id }}/sites/add" class="btn btn-primary">+ Добавить</a>
</div>
<a href="/admin/companies" class="btn btn-sm btn-secondary" style="margin-bottom:16px">← Назад к компаниям</a>
<div class="card">
  <div class="table-container">
    <table>
      <thead><tr><th>ID</th><th>Название</th><th>ТС</th><th>Действия</th></tr></thead>
      <tbody>
        {% for s in sites %}
        <tr>
          <td style="color:var(--text-dim)">{{ s.id }}</td>
          <td><strong>{{ s.name }}</strong></td>
          <td><a href="/admin/companies/{{ company.id }}/sites/{{ s.id }}/vehicles" class="btn btn-sm btn-secondary">ТС</a></td>
          <td>
            <a href="/admin/companies/{{ company.id }}/sites/{{ s.id }}/edit" class="btn btn-sm btn-secondary">Правка</a>
            <form action="/admin/companies/{{ company.id }}/sites/{{ s.id }}/delete" method="POST" style="display:inline" onsubmit="return confirm('Удалить площадку? ТС останутся без площадки.')">
              <button class="btn btn-sm btn-danger">Удалить</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="4" style="text-align:center;color:var(--text-dim)">Нет площадок</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
