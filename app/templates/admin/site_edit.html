{% extends "base.html" %}
{% block title %}UI fuel — {{ 'Редактировать' if site else 'Добавить' }} площадку{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ 'Редактировать' if site else 'Добавить' }} площадку</h1>
  <span style="color:var(--text-dim)">{{ company.name }}</span>
</div>
<div class="card">
  <form method="POST" style="max-width:400px">
    <div class="form-group">
      <label for="name">Название</label>
      <input type="text" id="name" name="name" value="{{ site.name if site else '' }}" required>
    </div>
    <div style="margin-top:16px">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="/admin/companies/{{ company.id }}/sites" class="btn btn-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
