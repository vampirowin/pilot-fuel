<div class="card" style="margin-bottom: 0;">
  <div class="search-bar" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0; color: var(--text-dim);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <div style="flex: 1; min-width: 140px;">
      <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 2px;">Госномер</div>
      <input
        type="text"
        name="plate"
        placeholder="..."
        value="{{ plate or '' }}"
        hx-get="{{ search_url or '/api/vehicles/search' }}"
        hx-trigger="keyup changed delay:300ms, search"
        hx-target="{{ search_target or '#vehicles-table' }}"
        hx-swap="innerHTML"
        hx-include="closest .search-bar"
        autocomplete="off"
        style="width: 100%; border: none; outline: none; background: transparent; font-size: 14px; color: var(--text);"
      >
    </div>
    <div style="flex: 1; min-width: 140px;">
      <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 2px;">IMEI</div>
      <input
        type="text"
        name="imei"
        placeholder="..."
        value="{{ imei or '' }}"
        hx-get="{{ search_url or '/api/vehicles/search' }}"
        hx-trigger="keyup changed delay:300ms, search"
        hx-target="{{ search_target or '#vehicles-table' }}"
        hx-swap="innerHTML"
        hx-include="closest .search-bar"
        autocomplete="off"
        style="width: 100%; border: none; outline: none; background: transparent; font-size: 14px; color: var(--text);"
      >
    </div>
    {% if plate or imei %}
    <a href="{{ clear_url or '/vehicles' }}" class="btn btn-sm btn-secondary" style="flex-shrink: 0;">Сбросить</a>
    {% endif %}
  </div>
</div>
