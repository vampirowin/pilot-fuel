<div class="search-bar search-bar-compact">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--text-dim)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input
    type="text"
    name="plate"
    placeholder="Поиск по госномеру..."
    value="{{ plate or '' }}"
    hx-get="{{ search_url or '/api/vehicles/search' }}"
    hx-trigger="keyup changed delay:300ms, search"
    hx-target="{{ search_target or '#vehicles-table' }}"
    hx-swap="innerHTML"
    hx-include="closest .search-bar"
    autocomplete="off"
  >
  {% if plate %}
  <a href="{{ clear_url or '/vehicles' }}" class="btn btn-sm btn-secondary" style="flex-shrink:0;">Сбросить</a>
  {% endif %}
</div>
