<div class="card" style="margin-bottom: 0;">
  <div class="search-bar" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink: 0; color: var(--text-dim);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input
      type="text"
      name="plate"
      placeholder="Госномер..."
      value="{{ plate or '' }}"
      hx-get="/api/vehicles/search"
      hx-trigger="keyup changed delay:300ms, search"
      hx-target="#vehicles-table"
      hx-swap="innerHTML"
      hx-include="closest .search-bar"
      autocomplete="off"
      style="flex: 1; min-width: 140px; border: none; outline: none; background: transparent; font-size: 14px; color: var(--text);"
    >
    <input
      type="text"
      name="imei"
      placeholder="IMEI..."
      value="{{ imei or '' }}"
      hx-get="/api/vehicles/search"
      hx-trigger="keyup changed delay:300ms, search"
      hx-target="#vehicles-table"
      hx-swap="innerHTML"
      hx-include="closest .search-bar"
      autocomplete="off"
      style="flex: 1; min-width: 140px; border: none; outline: none; background: transparent; font-size: 14px; color: var(--text);"
    >
    {% if plate or imei %}
    <a href="/vehicles" class="btn btn-sm btn-secondary" style="flex-shrink: 0;">Сбросить</a>
    {% endif %}
  </div>
</div>
