{% extends "base.html" %}
{% block title %}UI fuel — вход администратора{% endblock %}
{% block head %}{% endblock %}
{% block body_class %}login-page{% endblock %}
{% block body_wrapper %}
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 22V8l7-5v14l-7 5zM10 3l7 5v14l-7-5V3zM17 8l4 2v12l-4-2V8z"/>
      </svg>
    </div>
    <h1 class="login-title">UI fuel</h1>
    <p class="login-subtitle">Администратор</p>
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:12px;text-align:center">{{ error }}</div>
    {% endif %}
    <form action="/admin/login" method="POST" hx-post="/admin/login" hx-target="body" hx-push-url="true">
      <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div style="margin-top: 8px; font-size: 12px; color: var(--text-dim);"><a href="/login" style="color: var(--accent);">Войти через Pilot</a></div>
      <button type="submit" class="btn btn-primary btn-full">Войти</button>
    </form>
  </div>
</div>
{% endblock %}
